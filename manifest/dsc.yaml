# ──────────────────────────────────────────────────────────────
# Known follow-ups
# ──────────────────────────────────────────────────────────────
# 1. Directive- and Material-restyle primitives are included with `kind`:
#      tag                  — sg-* element (e.g. sg-table, sg-dialog)
#      attribute-directive  — selector applied to a host element ([sgX], button[sgX])
#      material-restyle     — Material element restyled by DSC (mat-icon, mat-select). Public API
#                              = Material's public API + DSC tokens; consult @angular/material docs.
# 2. Mechanical/behavioral directives ([sgAutoFocus], [sgDebounceClick],
#    form-validator composers, etc) are excluded — they aren't visual primitives.
# 3. Examples field is sparse — populate as bench bindings land.
# 4. Outputs are minimally extracted (regex-first). Hand-verify before treating
#    as authoritative — some EventEmitters declared via getter or computed are missed.
# 5. Curation map (/tmp/dsc-manifest/curation.json) is currently scratch. Promote
#    to solargis2-dsc/scripts/manifest/ on next iteration to make regen reproducible.
