# ──────────────────────────────────────────────────────────────
# Gaps requested by proto-bench (no DSC primitive yet)
# ──────────────────────────────────────────────────────────────
# These are primitives Claude van Context flagged as needed for prototyping
# but DSC does not currently expose. Render via composition for now; track
# in CC-N follow-ups if first-class primitives are wanted.
gaps_requested:
  - name: "sg-user"
    description: "Compact user identity (avatar + name). Used in audit trails, owner columns, comments. No DSC primitive — currently composed ad-hoc per call site."
  - name: "sg-user-group"
    description: "Stacked user avatars (e.g. 3+ overflow). Same status as sg-user."
  - name: "sg-avatar"
    description: "Single avatar atom (image / initials fallback). Foundation for sg-user / sg-user-group."
  - name: "sg-attribution-badge"
    description: "Dataset attribution badge (e.g. 'Solargis 3.0', 'NASA POWER'). Surfaces the data provenance in a consistent visual."
  - name: "sg-scene-snapshot"
    description: "Scene/image snapshot tile (e.g. PV layout preview). Currently rendered ad-hoc with <img>."
  - name: "sg-progress-cell"
    description: "Inline progress bar cell. Material's mat-progress-bar can stand in but proto-bench wants a cell-renderer wrapper."
  - name: "sg-table-data-status"
    description: "DataStatus widget for sg-table footer/header (loading/failed/no-data). Currently overlay components handle this in pieces."
  - name: "sg-card-trailing-badge"
    description: "Card-header pattern with trailing badge. Currently composed via sg-section + sg-inline-badge — proposed as first-class slot."

